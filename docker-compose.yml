services:
  skua-site:
    build: .
    container_name: skua-site
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CERTS_ALLOWLIST=/etc/skua/certs.allow
      - SERVERS_FILE=/etc/skua/servers.json
      # - REFRESH_SECRET=your-secret-here
    volumes:
      - ./presets:/data/presets
      - ./certs.allow:/etc/skua/certs.allow:ro
      - ./servers.json:/etc/skua/servers.json:ro

  nginx:
    build: ./nginx
    container_name: skua-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - skua-site
