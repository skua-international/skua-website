{{define "head"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{if .Title}}{{.Title}} — Skua International{{else}}Skua International — Arma 3 PMC{{end}}</title>
  <meta name="description" content="{{if .Description}}{{.Description}}{{else}}Skua International is a private military company in Arma 3. Modern and near-future operations with open enrollment. Founded on the Hecate Doctrine — speed, adaptability, efficiency.{{end}}">
  <meta name="keywords" content="Arma 3, PMC, milsim, Skua International, private military company, Arma 3 unit, tactical gaming, Arma 3 modded, open enrollment">
  <meta name="author" content="Skua International">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://skua.international{{.Path}}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Skua International">
  <meta property="og:title" content="{{if .Title}}{{.Title}} — Skua International{{else}}Skua International — Arma 3 PMC{{end}}">
  <meta property="og:description" content="{{if .Description}}{{.Description}}{{else}}Private military company in Arma 3. Modern/near-future operations. Open enrollment.{{end}}">
  <meta property="og:url" content="https://skua.international{{.Path}}">
  <meta property="og:image" content="https://skua.international/static/img/logo.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{if .Title}}{{.Title}} — Skua International{{else}}Skua International — Arma 3 PMC{{end}}">
  <meta name="twitter:description" content="{{if .Description}}{{.Description}}{{else}}Private military company in Arma 3. Modern/near-future operations. Open enrollment.{{end}}">
  <meta name="twitter:image" content="https://skua.international/static/img/logo.png">

  <meta name="theme-color" content="#08090a">
  <link rel="icon" href="/static/img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://www.youtube-nocookie.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css?v=4">
  <script>
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t)})();
  </script>

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Skua International",
    "url": "https://skua.international",
    "logo": "https://skua.international/static/img/logo.png",
    "description": "Private military company in Arma 3. Modern/near-future operations with open enrollment.",
    "sameAs": [
      "https://github.com/skua-international",
      "https://www.youtube.com/@SkuaIntl.PublicRelations",
      "https://discord.gg/z6qEYBTqKn"
    ]
  }
  </script>
</head>
<body>
  <a href="#app" class="skip-link">Skip to content</a>
  <nav id="nav" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-brand" aria-label="Skua International home">
        <img src="/static/img/logo.png" alt="" class="nav-logo" aria-hidden="true">
        <span class="nav-name">SKUA</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <div class="nav-links" id="nav-links" role="menubar">
        <a href="/" class="nav-link{{if eq .Active "home"}} active{{end}}" role="menuitem">Unit</a>
        <a href="/docs" class="nav-link{{if eq .Active "docs"}} active{{end}}" role="menuitem">Docs</a>
      </div>
      <button class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
        <span class="icon-sun" aria-hidden="true">☀</span>
        <span class="icon-moon" aria-hidden="true">☾</span>
      </button>
    </div>
  </nav>
  <main id="app" role="main">
{{end}}

{{define "foot"}}
  </main>
  <footer role="contentinfo">
    <p>Skua International — <a href="https://github.com/skua-international" target="_blank" rel="noopener">GitHub</a> · <a href="https://www.youtube.com/@SkuaIntl.PublicRelations" target="_blank" rel="noopener">YouTube</a></p>
  </footer>
  <script src="/static/js/app.js"></script>
  <noscript><style>.btn-copy,.yt-play-btn{display:none}.yt-facade{pointer-events:none}</style></noscript>
</body>
</html>
{{end}}
